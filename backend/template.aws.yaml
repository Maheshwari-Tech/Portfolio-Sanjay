AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Minimal-cost Sanjay Gandhi Portfolio FastAPI backend

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: Supabase transaction pooler SQLAlchemy URL on port 6543
  SupabaseUrl:
    Type: String
    Default: https://yfkruidoqgfyiqxdgapi.supabase.co
  SupabasePublishableKey:
    Type: String
    NoEcho: true
  JwtSecret:
    Type: String
    NoEcho: true
    MinLength: 32
  OtpHashSecret:
    Type: String
    NoEcho: true
    MinLength: 32
  CorsOrigins:
    Type: String
    Description: Comma-separated production Vercel/custom origins without trailing slash

Resources:
  PortfolioApi:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures: [x86_64]
      MemorySize: 512
      Timeout: 20
      ReservedConcurrentExecutions: 5
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED
      Environment:
        Variables:
          APP_ENV: production
          AUTH_PROVIDER: supabase
          RUNTIME_TARGET: lambda
          DATABASE_URL: !Ref DatabaseUrl
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_PUBLISHABLE_KEY: !Ref SupabasePublishableKey
          JWT_SECRET: !Ref JwtSecret
          OTP_HASH_SECRET: !Ref OtpHashSecret
          ADMIN_PHONE: "+918847472124"
          CORS_ORIGINS: !Ref CorsOrigins
          OTP_EXPIRY_MINUTES: "30"
          OTP_MAX_ATTEMPTS: "5"
      Policies:
        - AWSLambdaBasicExecutionRole
    Metadata:
      Dockerfile: Dockerfile.lambda
      DockerContext: .
      DockerTag: python312-v1

Outputs:
  ApiUrl:
    Description: Public HTTPS backend URL; application endpoints still enforce Supabase JWT authorization
    Value: !GetAtt PortfolioApiUrl.FunctionUrl
