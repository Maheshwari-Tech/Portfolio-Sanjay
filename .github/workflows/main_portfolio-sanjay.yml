name: Backend CI/CD · Azure App Service

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/main_portfolio-sanjay.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/main_portfolio-sanjay.yml"
  workflow_dispatch:

concurrency:
  group: azure-backend-production
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: portfolio-sanjay
  PYTHON_VERSION: "3.12"

permissions:
  contents: read

jobs:
  test:
    name: Test FastAPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

  deploy:
    name: Deploy Azure backend
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B8CCF5EBDD4C4F23A1D3ED1636380DFF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_392DEAFC64F847C5A21EDCBC5B900421 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_057DDE8A0BBA4261A3C78FF2F88E0766 }}

      - name: Configure and start App Service
        shell: bash
        run: |
          RESOURCE_GROUP="$(az webapp list --query "[?name=='${AZURE_WEBAPP_NAME}'].resourceGroup | [0]" --output tsv)"
          test -n "$RESOURCE_GROUP"

          HOSTNAME="$(az webapp show --name "$AZURE_WEBAPP_NAME" --resource-group "$RESOURCE_GROUP" --query defaultHostName --output tsv)"
          test -n "$HOSTNAME"

          echo "AZURE_RESOURCE_GROUP=$RESOURCE_GROUP" >> "$GITHUB_ENV"
          echo "AZURE_WEBAPP_URL=https://$HOSTNAME" >> "$GITHUB_ENV"

          az webapp config set \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --linux-fx-version "PYTHON|${PYTHON_VERSION}" \
            --startup-file "python -m uvicorn main:app --host 0.0.0.0 --port 8000"

          az webapp config appsettings set \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true

          az webapp start \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP"

      - name: Deploy FastAPI
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: backend

      - name: Restart App Service
        run: |
          az webapp restart \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP"

      - name: Verify deployment
        run: |
          curl --fail --show-error --silent \
            --retry 12 --retry-delay 10 --retry-all-errors \
            "$AZURE_WEBAPP_URL/health"
          curl --fail --show-error --silent \
            --retry 6 --retry-delay 10 --retry-all-errors \
            "$AZURE_WEBAPP_URL/ready"
