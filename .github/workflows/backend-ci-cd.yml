name: Backend CI/CD · AWS Lambda

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci-cd.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci-cd.yml"
  workflow_dispatch:

concurrency:
  group: backend-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Test FastAPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest -q

  deploy:
    name: Deploy Lambda
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials through GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: portfolio-backend-${{ github.run_id }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Validate SAM template
        run: sam validate --template-file template.aws.yaml

      - name: Build Lambda image
        run: sam build --template-file template.aws.yaml

      - name: Deploy CloudFormation stack
        env:
          STACK_NAME: ${{ vars.AWS_SAM_STACK_NAME }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OTP_HASH_SECRET: ${{ secrets.OTP_HASH_SECRET }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --capabilities CAPABILITY_IAM \
            --resolve-image-repos \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --on-failure ROLLBACK \
            --tags Application=portfolio-sanjay Environment=production ManagedBy=github-actions \
            --parameter-overrides \
              "DatabaseUrl=$DATABASE_URL" \
              "SupabaseUrl=$SUPABASE_URL" \
              "SupabasePublishableKey=$SUPABASE_PUBLISHABLE_KEY" \
              "JwtSecret=$JWT_SECRET" \
              "OtpHashSecret=$OTP_HASH_SECRET" \
              "CorsOrigins=$CORS_ORIGINS"

      - name: Read deployed API URL
        id: api
        env:
          STACK_NAME: ${{ vars.AWS_SAM_STACK_NAME }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          API_URL="$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)"
          test -n "$API_URL"
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "### Backend deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "Deployed commit: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "API: ${API_URL}" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify production health
        env:
          API_URL: ${{ steps.api.outputs.url }}
        run: |
          curl --fail --show-error --silent \
            --retry 8 --retry-delay 10 --retry-all-errors \
            "${API_URL}health"
          curl --fail --show-error --silent \
            --retry 8 --retry-delay 10 --retry-all-errors \
            "${API_URL}ready"
